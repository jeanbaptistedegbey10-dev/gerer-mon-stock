name: Keep sites alive

on:
  schedule:
    - cron: '0 6 * * *'    # tous les jours à 06:00 UTC
  workflow_dispatch:        # bouton pour lancer manuellement (test)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping URLs
        run: |
          for url in \
            "https://monsite1.vercel.app" \
            "https://monsite2.vercel.app" \
            "https://monsite3.com"; do
            echo "Ping $url"
            curl -sS -o /dev/null -w "%{http_code}\n" --retry 3 "$url" || echo "Échec: $url"
          done
